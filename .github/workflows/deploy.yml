name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  # Build and deploy are split so a deploy retry never re-uploads the artifact
  # (which caused "Multiple artifacts named github-pages").
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
        with: { enablement: true }
      - uses: actions/upload-pages-artifact@v3
        with: { path: dist }
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.d1.outputs.page_url || steps.d2.outputs.page_url || steps.d3.outputs.page_url }}
    steps:
      # GitHub Pages' deploy API intermittently returns "Deployment failed, try
      # again later." It almost always succeeds on retry, so try up to 3 times.
      - id: d1
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.d1.outcome == 'failure'
        run: echo "deploy attempt 1 failed — retrying"; sleep 20
      - id: d2
        if: steps.d1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        run: echo "deploy attempt 2 failed — final retry"; sleep 40
      - id: d3
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        uses: actions/deploy-pages@v4
